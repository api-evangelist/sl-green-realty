aid: sl-green-realty
name: SL Green Realty Corp.
description: 'SL Green Realty Corp. (NYSE: SLG) is "Manhattan''s largest office landlord,
  a fully integrated real estate investment trust, or REIT, that is focused primarily
  on acquiring, managing and maximizing the value of Manhattan commercial properties."
  Founded in 1997 by Stephen L. Green (as successor to S.L. Green Properties, established
  1980) and headquartered in New York City, SL Green is led by Chairman & CEO Marc
  Holliday. As of fiscal year-end 2024 the company reported 39 properties totaling
  approximately 25.3 million square feet, US$886M in revenue, US$10.47B in total assets,
  and 1,221 employees. The portfolio includes flagship trophy assets One Vanderbilt
  (1,401 ft, 1.75M sq ft, 62 stories, fully leased; home to Summit One Vanderbilt
  observation deck) and One Madison Avenue (2026 ULI Award for Excellence in Office
  Development), plus 420 Lexington Avenue, 1185 Avenue of the Americas, 1350 Avenue
  of the Americas, 800 Third Avenue, 825 Eighth Avenue, Worldwide Plaza, the Pershing
  Square Building, and 15 Laight Street in Tribeca. The company is the New York joint-venture
  partner for Caesars Palace Times Square, the proposed casino/entertainment complex
  at 1515 Broadway (and adjacent 1185 Avenue of the Americas redevelopment), pending
  issuance of one of three New York State downstate gaming licenses. Business divisions
  span leasing, finance, investments, construction, development, hospitality, property
  management, security & life safety, sustainability, and technology. SL Green publishes
  no public developer APIs, no OpenAPI/AsyncAPI specs, no SDKs, no developer portal,
  no public GitHub organization, and no public sandbox. Its tenant-facing technology
  surface is delivered through third-party platforms — the "My Building" tenant portal,
  RequestCom for building services, and ADP Workforce for recruitment — none of which
  expose a programmable interface attributable to SL Green. This profile documents
  the REIT, its portfolio, leadership, and verified absence of a public API footprint.'
