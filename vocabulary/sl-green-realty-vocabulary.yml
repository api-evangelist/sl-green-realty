    role: Casino gaming regulator for the Caesars Palace Times Square proposal.
  - body: New York State Gaming Facility Location Board
    role: Selects awardees of the three NY downstate commercial gaming licenses.
  - body: U.S. Securities and Exchange Commission
    role: Federal securities regulator (10-K, 10-Q, 8-K filings under CIK 0001040971).

