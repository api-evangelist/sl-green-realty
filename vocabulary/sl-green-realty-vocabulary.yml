name: SL Green Realty Vocabulary
description: >-
  Domain vocabulary covering SL Green Realty Corp. (NYSE: SLG) — Manhattan's
  largest office landlord and a fully integrated commercial real estate
  investment trust (REIT). SL Green publishes no public developer APIs, so
  this vocabulary frames the REIT, its portfolio, operating divisions, and
  marquee development programs rather than a programmable surface.
url: >-
  https://raw.githubusercontent.com/api-evangelist/sl-green-realty/refs/heads/main/vocabulary/sl-green-realty-vocabulary.yml
created: '2026-05-23'
modified: '2026-05-23'

corporate:
  - term: SL Green Realty Corp.
    abbreviation: SLG
    definition: >-
      Publicly traded (NYSE: SLG) fully integrated real estate investment
      trust headquartered in New York City, focused on acquiring, managing
      and maximizing the value of Manhattan commercial properties. Founded
      in 1997 as the successor to S.L. Green Properties (established 1980).
  - term: Real Estate Investment Trust
    abbreviation: REIT
    definition: >-
      Corporate structure that owns and typically operates income-producing
      real estate; distributes at least 90% of taxable income as dividends
      to qualify for tax pass-through treatment under U.S. tax law.
  - term: NYSE SLG
    definition: New York Stock Exchange ticker for SL Green Realty Corp.
  - term: CIK 0001040971
    definition: SEC EDGAR central index key for SL Green Realty Corp.

leadership:
  - role: Chairman & Chief Executive Officer
    name: Marc Holliday
  - role: Founder
    name: Stephen L. Green

geography:
  - term: Manhattan
    definition: New York County, NY — sole geographic focus of SL Green's portfolio.
  - submarket: Grand Central
  - submarket: Midtown South / Chelsea
  - submarket: Plaza District
  - submarket: Downtown
  - submarket: Westside
  - submarket: Midtown West
  - submarket: Times Square
  - submarket: Park Avenue South / Flatiron
  - submarket: Penn Station

portfolio:
  - term: One Vanderbilt
    definition: >-
      1,401-ft, 62-story trophy office tower at 1 Vanderbilt Avenue (42nd
      St & Vanderbilt Ave) opened September 14, 2020 at a cost of US$3.31
      billion. 1.75M sq ft, anchor tenant TD Bank; home to Summit One
      Vanderbilt observation deck and Le Pavillon. Co-owned with the
      National Pension Service of Korea, Hines, and Mori Building Company.
  - term: One Madison Avenue
    definition: >-
      SL Green office redevelopment on Madison Square Park, recipient of
      the 2026 ULI Award for Excellence in Office Development.
  - term: Summit One Vanderbilt
    definition: >-
      Observation deck experience inside One Vanderbilt at 1,020 ft, opened
      October 2021.
  - term: Caesars Palace Times Square
    definition: >-
      Proposed casino-hotel-entertainment complex at 1515 Broadway in Times
      Square — an SL Green-led joint venture with Caesars Entertainment and
      Roc Nation. Pending issuance of one of three New York State downstate
      commercial gaming licenses by the NY Gaming Facility Location Board.
  - term: Trophy Asset
    definition: >-
      Industry term for top-tier, marquee commercial properties commanding
      premium rents — One Vanderbilt and One Madison Avenue are SL Green's
      trophy assets.

