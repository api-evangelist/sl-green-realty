tenant_technology:
  - term: My Building
    definition: >-
      Tenant-facing services portal accessible from slgreen.com — no public
      API or developer documentation exposed.
  - term: RequestCom
    definition: Third-party building services platform referenced by SL Green.
  - term: ADP Workforce
    definition: Third-party recruitment platform referenced by SL Green.

regulators:
